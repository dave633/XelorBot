<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | XeloriaLand</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Orbitron:wght@700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080312;
            --bg-card: rgba(18, 10, 35, 0.7);
            --accent-purple: #7c3aed;
            --accent-red: #ef4444;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Style */
        .sidebar {
            width: 320px;
            background: rgba(10, 5, 20, 0.95);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 2rem;
            backdrop-filter: blur(20px);
        }

        .sidebar-logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            margin-bottom: 3rem;
            display: block;
            text-decoration: none;
            color: white;
            letter-spacing: 2px;
        }

        .btn-new-ticket {
            background: linear-gradient(135deg, var(--accent-purple), #5b21b6);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            margin-bottom: 2rem;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.2);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .btn-new-ticket:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(124, 58, 237, 0.4);
        }

        .ticket-list {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 2rem;
        }

        .ticket-item {
            padding: 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            margin-bottom: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .ticket-item:hover {
            background: rgba(124, 58, 237, 0.1);
            border-color: rgba(124, 58, 237, 0.3);
        }

        .ticket-item.active {
            background: rgba(124, 58, 237, 0.15);
            border-color: var(--accent-purple);
        }

        .ticket-id {
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--accent-purple);
            margin-bottom: 0.3rem;
        }

        .ticket-subject {
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Main Chat Area */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: rgba(8, 3, 18, 0.5);
            position: relative;
        }

        .top-bar {
            padding: 1.5rem 2rem;
            background: rgba(10, 5, 20, 0.8);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        #active-ticket-title {
            font-size: 1.1rem;
            font-weight: 800;
        }

        .chat-area {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Message Bubbles */
        .msg {
            max-width: 70%;
            padding: 1.2rem;
            border-radius: 18px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.sent {
            align-self: flex-end;
            background: var(--accent-purple);
            border-bottom-right-radius: 4px;
        }

        .msg.received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 1.5rem 2rem;
            background: rgba(10, 5, 20, 0.9);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .chat-input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 1.2rem;
            border-radius: 12px;
            color: white;
            outline: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .chat-input:focus {
            border-color: var(--accent-purple);
            background: rgba(124, 58, 237, 0.05);
        }

        .btn-send {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: 12px;
            height: 100%;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: #110821;
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            width: 450px;
            text-align: center;
        }

        .modal-step h2 {
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 2rem;
            font-size: 1.2rem;
        }

        .cat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .cat-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            font-weight: 700;
        }

        .cat-btn:hover {
            border-color: var(--accent-purple);
            background: rgba(124, 58, 237, 0.1);
        }

        /* Overlay Login */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #080312;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div id="login-overlay">
        <h1 style="font-family: 'Orbitron', sans-serif; margin-bottom: 20px;">XelorBot Dashboard</h1>
        <p style="color: var(--text-dim); margin-bottom: 40px;">Načítání zabezpečeného spojení...</p>
    </div>

    <!-- Modal pro vytvoření ticketu -->
    <div class="modal" id="ticket-modal">
        <div class="modal-content">
            <div id="step-1" class="modal-step">
                <h2>Vyber Kategorii</h2>
                <div class="cat-grid">
                    <div class="cat-btn" onclick="selectCategory('Hráč', '👤')">👤 HRÁČ</div>
                    <div class="cat-btn" onclick="selectCategory('Technický', '🛠️')">🛠️ TECH</div>
                    <div class="cat-btn" onclick="selectCategory('Platba', '💰')">💰 PLATBA</div>
                    <div class="cat-btn" onclick="selectCategory('Jiný', '🛸')">🛸 OSTATNÍ</div>
                </div>
            </div>
            <div id="step-2" class="modal-step" style="display: none;">
                <h2 id="selected-cat-title">🛠️ Technický Ticket</h2>
                <input type="text" id="ticket-subject" class="chat-input" placeholder="O čem to je? (předmět)"
                    style="width: 100%; margin-bottom: 1.5rem;">
                <button class="btn-new-ticket" onclick="submitTicket()" style="width: 100%;">Vytvořit Ticket</button>
                <div onclick="resetModal()"
                    style="margin-top: 1rem; cursor: pointer; font-size: 0.8rem; color: var(--text-dim);">← Zpět</div>
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <a href="index.html" class="sidebar-logo">⚡ XELORIA</a>
        <button class="btn-new-ticket" onclick="createNewTicket()">+ Nový Web Ticket</button>
        <div class="ticket-list" id="ticket-list">
            <!-- Dynamicky načteno -->
        </div>
        <div
            style="padding: 1rem; border-top: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between;">
            <div id="user-info" style="font-weight: 800; font-size: 0.8rem;">---</div>
            <a href="/logout"
                style="color: var(--accent-red); font-size: 0.8rem; font-weight: 950; text-decoration: none;">LOGOUT</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div style="display: flex; align-items: center; gap: 10px;">
                <h2 id="active-ticket-title">Centrum Podpory #2</h2>
                <button id="close-btn" onclick="closeTicket()"
                    style="display: none; background: var(--accent-red); border: none; color: white; padding: 4px 12px; border-radius: 6px; font-weight: 900; font-size: 0.65rem; cursor: pointer;">UZAVŘÍT</button>
            </div>
        </header>
        <div class="chat-area" id="chat-area">
            <div style="text-align: center; color: var(--text-dim); margin-top: 5rem;">
                <span style="font-size: 3rem; display: block; margin-bottom: 1rem;">🛡️</span>
                Vyberte ticket vlevo nebo vytvořte nový pro zahájení chatu.
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="message-input" class="chat-input" placeholder="Zadejte svou zprávu..."
                autocomplete="off">
            <button class="btn-send" onclick="sendMessage()">ODESLAT</button>
        </div>
    </main>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        let currentUser = null;
        let currentTicketId = null;

        async function init() {
            try {
                const res = await fetch('/api/user');
                const data = await res.json();
                if (data.loggedIn) {
                    currentUser = data;
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('user-info').textContent = data.username;
                    socket.emit('get_my_web_tickets', { userId: data.id, isStaff: data.isStaff });
                } else { window.location.href = '/auth/discord'; }
            } catch (e) { console.error('Auth error', e); }
        }

        socket.on('your_web_tickets', (tickets) => {
            const list = document.getElementById('ticket-list');
            list.innerHTML = '';
            tickets.forEach(t => {
                const div = document.createElement('div');
                div.className = `ticket-item ${t.id === currentTicketId ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="ticket-id">${t.id} ${t.status === 'closed' ? '🔒' : ''}</div>
                    <div class="ticket-subject">${t.subject}</div>
                `;
                div.onclick = () => selectTicket(t.id);
                list.appendChild(div);
            });
        });

        function selectTicket(id) {
            currentTicketId = id;
            socket.emit('join_web_ticket', id);
            document.getElementById('active-ticket-title').textContent = `TICKET ${id}`;
            const items = document.querySelectorAll('.ticket-item');
            items.forEach(it => {
                const text = it.querySelector('.ticket-id').textContent;
                if (text.includes(id)) it.classList.add('active'); else it.classList.remove('active');
            });
        }

        socket.on('web_ticket_history', (ticket) => {
            const chat = document.getElementById('chat-area');
            chat.innerHTML = '';
            ticket.messages.forEach(m => appendMsg(m));
            const cBtn = document.getElementById('close-btn');
            if (currentUser.isStaff && ticket.status === 'open') cBtn.style.display = 'block'; else cBtn.style.display = 'none';
        });

        socket.on('web_ticket_created', (newTicket) => { selectTicket(newTicket.id); });

        socket.on('new_web_message', (data) => {
            if (data.ticketId === currentTicketId) appendMsg(data.message);
        });

        function appendMsg(m) {
            const chat = document.getElementById('chat-area');
            const div = document.createElement('div');
            const isMe = m.author === currentUser.username;
            div.className = `msg ${isMe ? 'sent' : 'received'}`;
            div.innerHTML = `<div style="font-size: 0.6rem; opacity: 0.7; margin-bottom: 5px; font-weight: 900;">${m.author.toUpperCase()}</div>${m.content}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function sendMessage() {
            const inp = document.getElementById('message-input');
            const val = inp.value.trim();
            if (!currentTicketId) { alert('Prvně vyber ticket vlevo!'); return; }
            if (val) {
                socket.emit('send_web_message', { ticketId: currentTicketId, userId: currentUser.id, username: currentUser.username, content: val });
                inp.value = '';
            }
        }

        function closeTicket() { if (confirm('Uzavřít tento ticket?')) socket.emit('close_web_ticket', currentTicketId); }

        // Modal Logic
        function createNewTicket() { document.getElementById('ticket-modal').style.display = 'flex'; resetModal(); }
        function closeModal() { document.getElementById('ticket-modal').style.display = 'none'; }

        let selectedCat = '';
        function selectCategory(cat, icon) {
            selectedCat = cat;
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
            document.getElementById('selected-cat-title').textContent = `${icon} ${cat.toUpperCase()} TICKET`;
        }
        function resetModal() {
            document.getElementById('step-1').style.display = 'block';
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('ticket-subject').value = '';
        }
        function submitTicket() {
            const subj = document.getElementById('ticket-subject').value.trim();
            if (subj && selectedCat) {
                socket.emit('create_web_ticket', { userId: currentUser.id, username: currentUser.username, category: selectedCat, subject: subj });
                closeModal();
            } else alert('Zadej předmět!');
        }

        document.getElementById('message-input').onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };
        init();
    </script>
</body>

</html>
