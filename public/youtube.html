<head>

    <style>
        :root {
            --bg-deep: #0f071a;
            --bg-card: #1a0b2e;
            --accent-purple: #7c3aed;
            --accent-red: #ef4444;
            --text-main: #f5f5f5;
            --text-dim: #a78bfa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% -20%, #4c1d95 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }

        header {
            padding: 1.5rem 2rem;
            background: rgba(15, 7, 26, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text-main);
            text-decoration: none;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: glitch 3s infinite alternate;
        }

        @keyframes glitch {
            0% {
                text-shadow: 2px 0 0 #ef4444, -2px 0 0 #7c3aed;
            }

            20% {
                text-shadow: -2px 0 0 #ef4444, 2px 0 0 #7c3aed;
            }

            40% {
                text-shadow: 3px 0 0 #ef4444, -1px 0 0 #7c3aed;
            }

            60% {
                text-shadow: -1px 0 0 #ef4444, 3px 0 0 #7c3aed;
            }

            80% {
                text-shadow: 2px 0 0 #ef4444, -2px 0 0 #7c3aed;
            }

            100% {
                text-shadow: 0 0 10px var(--accent-red), 0 0 20px var(--accent-red);
            }
        }

        .logo span {
            color: var(--accent-red);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
            display: flex;
            align-items: center;
        }

        .nav-links a:hover {
            color: var(--accent-red);
        }

        .discord-btn {
            background: linear-gradient(135deg, #7c3aed 0%, #ef4444 100%);
            color: white !important;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .discord-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.6);
            filter: brightness(1.2);
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 4rem;
            font-weight: 800;
        }

        .section-title span {
            color: var(--accent-red);
        }

        /* Super Anime YouTube Section */
        .youtube-section {
            padding: 8rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .youtube-bg-text {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10rem;
            font-weight: 900;
            color: rgba(239, 68, 68, 0.03);
            white-space: nowrap;
            pointer-events: none;
            z-index: -1;
            text-transform: uppercase;
        }

        .youtube-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 3rem;
            margin-top: 4rem;
        }

        .yt-card {
            background: rgba(26, 11, 46, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 20px;
            padding: 3.5rem 2rem;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .yt-card::before {
            content: "ユーチューブ";
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 0.7rem;
            color: rgba(239, 68, 68, 0.4);
            font-weight: 700;
            letter-spacing: 2px;
        }

        .yt-card:hover {
            transform: translateY(-20px) scale(1.02);
            border-color: var(--accent-red);
            box-shadow: 0 20px 60px rgba(239, 68, 68, 0.25);
            background: rgba(239, 68, 68, 0.05);
        }

        .yt-card:hover .yt-frame {
            transform: rotate(180deg) scale(1.1);
            border-radius: 30%;
        }

        .yt-frame {
            width: 140px;
            height: 140px;
            border: 3px solid var(--accent-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            position: relative;
            transition: all 0.8s ease;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        .yt-frame::after {
            content: "";
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 50%;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.9);
                opacity: 1;
            }

            100% {
                transform: scale(1.2);
                opacity: 0;
            }
        }

        .yt-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(0.2) contrast(1.1);
            transition: all 0.3s;
        }

        .yt-card:hover .yt-img {
            filter: grayscale(0) contrast(1.2);
            transform: scale(1.1);
        }

        .yt-info {
            text-align: center;
            z-index: 2;
        }

        .yt-jp-text {
            color: var(--accent-red);
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 0.5rem;
            opacity: 0.7;
        }

        .yt-name {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }

        .yt-sub {
            color: var(--text-dim);
            font-weight: 600;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.3rem 1rem;
            border-radius: 50px;
        }

        .yt-btn {
            margin-top: 2.5rem;
            background: linear-gradient(135deg, #ff0000 0%, #8b0000 100%);
            color: white;
            padding: 1rem 3rem;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .yt-card:hover .yt-btn {
            background: white;
            color: #ff0000;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
        }

        footer {
            padding: 4rem 2rem;
            text-align: center;
            background: #0a0512;
            border-top: 1px solid rgba(124, 58, 237, 0.1);
            color: var(--text-dim);
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .youtube-bg-text {
                font-size: 5rem;
            }
        }
    </style>
</head>
